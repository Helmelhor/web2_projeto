default: &default
  adapter: postgresql
  encoding: unicode
  # A mágica do ENV.fetch: se rodar no Docker, ele usa as variáveis. Se rodar local, usa o padrão.
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "root") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "web2_dev") %>

production:
  <<: *default
  database: web2_producao