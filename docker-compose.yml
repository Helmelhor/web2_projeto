version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: web2_dev
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  app:
    build: .
    # ADICIONADO AQUI: Mapeia os arquivos da sua máquina para dentro do Docker
    volumes:
      - .:/rails
    ports:
      - '3000:3000'
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: root
      DATABASE_NAME: web2_dev
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - db
      - rabbitmq

  subscriber:
    build: .
    entrypoint: []
    command: bundle exec rails rabbitmq:listen
    # ADICIONADO AQUI TAMBÉM:
    volumes:
      - .:/rails
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: root
      DATABASE_NAME: web2_dev
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - db
      - rabbitmq

volumes:
  db_data:
  rabbitmq_data: